services:
  - type: web
    name: medsense-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://www.mymedsense.co
      - key: CORS_ORIGINS
        value: https://mymedsense.co,https://www.mymedsense.co
      - key: DEFAULT_COUNTRY_CODE
        value: "254"
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        sync: false
      - key: DB_SSL_REJECT_UNAUTHORIZED
        sync: false
      - key: JWT_SECRET
        sync: false
